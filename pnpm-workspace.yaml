allowBuilds:
  '@parcel/watcher': false
  esbuild: true
  sharp: false
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true
catalogMode: prefer
cleanupUnusedCatalogs: true
ignoreWorkspaceRootCheck: true
minimumReleaseAgeExclude:
  - nostics@1.1.4
  - '@antfu/design@0.2.1'
  - crossws@0.4.8
  - iframe-pane@1.1.0
shamefullyHoist: true
shellEmulator: true
strictPeerDependencies: false
trustPolicy: no-downgrade
trustPolicyExclude:
  - tinyexec@1.2.2
  - '@pierre/theme@1.1.0'
packages:
  - packages/*
  - plugins/*
  - examples/*
  - storybook
  - docs
